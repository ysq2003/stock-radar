<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>历史股价数据查询</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2230;
      --border: #252a38;
      --accent: #e8b84b;
      --red: #f06464;
      --green: #4fcf8a;
      --blue: #5b9cf6;
      --blue-dim: rgba(91,156,246,0.15);
      --text: #e2e6f0;
      --text-muted: #6b738a;
      --text-dim: #9198ae;
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #131620 0%, var(--bg) 100%);
    }
    .header-inner { max-width: 720px; margin: 0 auto; }
    .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }
    h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.04em; }
    .subtitle { font-size: 12px; color: var(--text-muted); margin-left: 18px; }

    /* ── Panel ── */
    .panel { max-width: 720px; margin: 24px auto 0; padding: 0 16px; }
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .input-label {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 10px;
    }

    /* Tags */
    .tags-row {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 12px; min-height: 32px;
    }
    .tag {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px 4px 12px;
      background: var(--blue-dim);
      border: 1px solid rgba(91,156,246,0.3);
      border-radius: 20px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--blue);
      animation: tagIn 0.2s ease;
    }
    @keyframes tagIn {
      from { opacity:0; transform:scale(0.85); }
      to   { opacity:1; transform:scale(1); }
    }
    .tag-remove {
      cursor: pointer; width: 16px; height: 16px;
      border-radius: 50%; background: rgba(91,156,246,0.2);
      border: none; color: var(--blue); font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    .tag-remove:hover { background: rgba(240,100,100,0.3); color: var(--red); }

    /* Input row */
    .input-row { display: flex; gap: 8px; }
    input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder {
      color: var(--text-muted);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 13px;
    }
    .btn-add {
      padding: 10px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-size: 18px; line-height: 1;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-add:hover { border-color: var(--accent); color: var(--accent); }

    .btn-query {
      width: 100%; margin-top: 14px; padding: 13px;
      background: var(--accent); color: #0d0f14;
      border: none; border-radius: var(--radius-sm);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.04em; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-query:hover { background: #f0c85a; transform: translateY(-1px); }
    .btn-query:active { transform: translateY(0); }
    .btn-query:disabled {
      background: var(--surface2); color: var(--text-muted);
      transform: none; cursor: not-allowed;
    }

    /* History */
    .history-row {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
    }
    .history-label { font-size: 11px; color: var(--text-muted); align-self: center; }
    .history-chip {
      padding: 3px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .history-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* Status */
    .status-bar {
      max-width: 720px; margin: 14px auto 0; padding: 0 16px;
      font-size: 12px; color: var(--text-muted);
      min-height: 18px; display: flex; align-items: center; gap: 8px;
    }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-msg { color: var(--red); }

    /* Charts */
    #charts {
      max-width: 720px; margin: 20px auto 0;
      padding: 0 16px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: cardIn 0.35s ease both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .chart-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
    }
    .stock-name { font-size: 16px; font-weight: 700; }
    .stock-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--text-muted); margin-top: 2px;
    }
    .badge-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .badge {
      padding: 3px 8px; border-radius: 6px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }
    .badge-red   { background: rgba(240,100,100,0.15); color: var(--red); }
    .badge-green { background: rgba(79,207,138,0.15);  color: var(--green); }
    .badge-dim   { background: var(--surface2); color: var(--text-muted); }

    .toggle-row {
      display: flex; gap: 8px; padding: 12px 18px 0; flex-wrap: wrap;
    }
    .toggle-btn {
      padding: 3px 10px; border-radius: 6px;
      font-size: 11px; font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted);
      transition: all 0.15s;
    }
    .toggle-btn.active-max   { border-color: var(--red);   background: rgba(240,100,100,0.1); color: var(--red); }
    .toggle-btn.active-min   { border-color: var(--green); background: rgba(79,207,138,0.1);  color: var(--green); }
    .toggle-btn.active-close { border-color: var(--blue);  background: rgba(91,156,246,0.1);  color: var(--blue); }

    .chart-wrap { padding: 16px 12px 4px; position: relative; height: 240px; }
    .chart-legend {
      display: flex; gap: 16px; padding: 10px 18px 14px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
    .legend-dot  { width: 8px; height: 8px; border-radius: 50%; }

    .chart-error { padding: 40px 18px; text-align: center; color: var(--red); font-size: 13px; }

    /* ── 数据表格 ── */
    .table-section {
      border-top: 1px solid var(--border);
    }
    .table-section-label {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px 0;
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .table-section-label::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .table-wrap {
      overflow-x: auto;
      padding: 10px 0 0;
    }

    table.price-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
    table.price-table thead {
      position: sticky; top: 0; z-index: 1;
      background: var(--surface2);
    }
    table.price-table th {
      padding: 8px 14px;
      text-align: right;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    table.price-table th:first-child { text-align: left; }
    table.price-table td {
      padding: 9px 14px;
      text-align: right;
      border-bottom: 1px solid rgba(37,42,56,0.6);
      white-space: nowrap;
      color: var(--text-dim);
      transition: background 0.1s;
    }
    table.price-table td:first-child {
      text-align: left;
      color: var(--text-muted);
    }
    table.price-table tbody tr:last-child td { border-bottom: none; }
    table.price-table tbody tr:hover td { background: rgba(255,255,255,0.025); }

    /* 最新一行高亮 */
    table.price-table tbody tr.latest td {
      background: rgba(232,184,75,0.04);
    }
    table.price-table tbody tr.latest td:first-child {
      color: var(--accent);
      font-weight: 600;
    }

    .td-max   { color: var(--red)   !important; }
    .td-min   { color: var(--green) !important; }
    .td-close { color: var(--blue)  !important; }
    .td-vol   { color: var(--text-dim); }

    .td-pct-up   { color: var(--red)   !important; font-weight: 600; }
    .td-pct-dn   { color: var(--green) !important; font-weight: 600; }
    .td-pct-flat { color: var(--text-muted) !important; }

    /* 表格底部留白 */
    .table-pad { height: 6px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-row">
      <div class="logo-dot"></div>
      <h1>股价区间走势</h1>
    </div>
    <div class="subtitle">最近 5～6 个交易日 · 最高价 / 最低价 / 收盘价</div>
  </div>
</header>

<div class="panel">
  <div class="input-card">
    <div class="input-label">股票代码（最多 5 只）</div>
    <div class="tags-row" id="tagsRow"></div>
    <div class="input-row">
      <input type="text" id="codeInput"
        placeholder="输入6位代码后按 Enter 或点击 ＋，如 600519"
        maxlength="8" />
      <button class="btn-add" id="btnAdd" title="添加">＋</button>
    </div>
    <div class="history-row" id="historyRow" style="display:none">
      <span class="history-label">最近</span>
    </div>
    <button class="btn-query" id="btnQuery" disabled>查询走势</button>
  </div>
</div>

<div class="status-bar" id="statusBar"></div>
<div id="charts"></div>

<script>
// ── 配置 ─────────────────────────────────────────────────
const WORKER_URL = "https://stockhistory.ysq4006.workers.dev";
const MAX = 5;

// ── 状态 ─────────────────────────────────────────────────
let codes = [];
const chartInstances = {};

// ── DOM ──────────────────────────────────────────────────
const tagsRow   = document.getElementById("tagsRow");
const codeInput = document.getElementById("codeInput");
const btnAdd    = document.getElementById("btnAdd");
const btnQuery  = document.getElementById("btnQuery");
const statusBar = document.getElementById("statusBar");
const chartsDiv = document.getElementById("charts");
const historyRow = document.getElementById("historyRow");

// ── 历史记录 ──────────────────────────────────────────────
function loadHistory() {
  try { return JSON.parse(localStorage.getItem("stockHistory") || "[]"); } catch { return []; }
}
function saveHistory(code) {
  let h = loadHistory().filter(c => c !== code);
  h.unshift(code);
  localStorage.setItem("stockHistory", JSON.stringify(h.slice(0, 10)));
}
function renderHistory() {
  const h = loadHistory();
  if (!h.length) { historyRow.style.display = "none"; return; }
  historyRow.style.display = "flex";
  historyRow.querySelectorAll(".history-chip").forEach(c => c.remove());
  h.forEach(code => {
    const btn = document.createElement("button");
    btn.className = "history-chip";
    btn.textContent = code;
    btn.onclick = () => addCode(code);
    historyRow.appendChild(btn);
  });
}
renderHistory();

// ── Tag 管理 ──────────────────────────────────────────────
function addCode(raw) {
  const code = raw.trim();
  if (!code) return;
  if (!/^\d{6}$/.test(code)) { showStatus("股票代码应为 6 位数字", "err"); return; }
  if (codes.includes(code))  { showStatus(`${code} 已在列表中`, "err"); return; }
  if (codes.length >= MAX)   { showStatus(`最多添加 ${MAX} 只`, "err"); return; }
  codes.push(code);
  renderTags();
  codeInput.value = "";
  clearStatus();
}
function removeCode(code) {
  codes = codes.filter(c => c !== code);
  renderTags();
}
function renderTags() {
  tagsRow.innerHTML = "";
  codes.forEach(code => {
    const tag = document.createElement("div");
    tag.className = "tag";
    tag.innerHTML = `${code}<button class="tag-remove" title="移除">✕</button>`;
    tag.querySelector(".tag-remove").onclick = () => removeCode(code);
    tagsRow.appendChild(tag);
  });
  btnQuery.disabled = codes.length === 0;
  codeInput.disabled = codes.length >= MAX;
}

btnAdd.onclick = () => addCode(codeInput.value);
codeInput.addEventListener("keydown", e => { if (e.key === "Enter") addCode(codeInput.value); });

// ── 状态栏 ────────────────────────────────────────────────
function showStatus(msg, type = "info") {
  if (type === "loading") {
    statusBar.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
  } else if (type === "err") {
    statusBar.innerHTML = `<span class="err-msg">⚠ ${msg}</span>`;
  } else {
    statusBar.textContent = msg;
  }
}
function clearStatus() { statusBar.innerHTML = ""; }

// ── 查询 ──────────────────────────────────────────────────
btnQuery.addEventListener("click", async () => {
  if (!codes.length) return;
  btnQuery.disabled = true;
  chartsDiv.innerHTML = "";
  Object.values(chartInstances).forEach(c => c.instance?.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);

  showStatus("正在获取数据…", "loading");
  codes.forEach(saveHistory);
  renderHistory();

  try {
    const res = await fetch(`${WORKER_URL}/stock?codes=${codes.join(",")}`);
    if (!res.ok) throw new Error(`Worker 响应异常：${res.status}`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    clearStatus();
    json.stocks.forEach((stock, idx) => renderCard(stock, idx));

    const cachedCount = json.stocks.filter(s => s.cached).length;
    if (cachedCount) showStatus(`${cachedCount} 只来自缓存，其余为实时数据`);

  } catch (err) {
    showStatus(err.message || "请求失败，请检查网络或 Worker 配置", "err");
  }

  btnQuery.disabled = codes.length === 0;
});

// ── 渲染单张图表卡片 ──────────────────────────────────────
function renderCard(stock, idx) {
  const card = document.createElement("div");
  card.className = "chart-card";
  card.style.animationDelay = `${idx * 0.08}s`;

  if (stock.error) {
    card.innerHTML = `
      <div class="chart-header">
        <div><div class="stock-name">${stock.code}</div></div>
      </div>
      <div class="chart-error">⚠ ${stock.error}</div>`;
    chartsDiv.appendChild(card);
    return;
  }

  const list = stock.list || [];
  if (!list.length) {
    card.innerHTML = `
      <div class="chart-header">
        <div>
          <div class="stock-name">${stock.name}</div>
          <div class="stock-code">${stock.code}</div>
        </div>
      </div>
      <div class="chart-error">暂无数据</div>`;
    chartsDiv.appendChild(card);
    return;
  }

  const last = list[list.length - 1];
  const pct  = parseFloat(last.changepct ?? 0);
  const badgeClass = pct > 0 ? "badge-red" : pct < 0 ? "badge-green" : "badge-dim";
  const badgeText  = pct > 0 ? `+${pct.toFixed(2)}%` : `${pct.toFixed(2)}%`;
  const dateRange  = `${list[0].date.slice(5)} ~ ${last.date.slice(5)}`;
  const canvasId   = `chart-${stock.code}`;

  card.innerHTML = `
    <div class="chart-header">
      <div>
        <div class="stock-name">${stock.name}</div>
        <div class="stock-code">${stock.code}</div>
      </div>
      <div class="badge-row">
        <span class="badge badge-dim">${dateRange}</span>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
    </div>
    <div class="toggle-row">
      <button class="toggle-btn active-max"   data-key="max"   data-code="${stock.code}">最高价</button>
      <button class="toggle-btn active-min"   data-key="min"   data-code="${stock.code}">最低价</button>
      <button class="toggle-btn active-close" data-key="close" data-code="${stock.code}">收盘价</button>
    </div>
    <div class="chart-wrap"><canvas id="${canvasId}"></canvas></div>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#f06464"></div>最高价</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4fcf8a"></div>最低价</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5b9cf6"></div>收盘价</div>
    </div>
    ${buildTableHTML(list, stock.code)}`;

  chartsDiv.appendChild(card);

  // 图表
  const labels    = list.map(d => d.date.slice(5));
  const maxData   = list.map(d => parseFloat(d.max));
  const minData   = list.map(d => parseFloat(d.min));
  const closeData = list.map(d => parseFloat(d.close));

  const rangeFillPlugin = {
    id: "rangeFill",
    beforeDatasetsDraw(chart) {
      const { ctx } = chart;
      const meta0 = chart.getDatasetMeta(0);
      const meta1 = chart.getDatasetMeta(1);
      if (!meta0.visible || !meta1.visible) return;
      ctx.save();
      ctx.beginPath();
      meta0.data.forEach((pt, i) => i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y));
      [...meta1.data].reverse().forEach(pt => ctx.lineTo(pt.x, pt.y));
      ctx.closePath();
      ctx.fillStyle = "rgba(232,184,75,0.07)";
      ctx.fill();
      ctx.restore();
    }
  };

  const ctx = document.getElementById(canvasId).getContext("2d");
  const instance = new Chart(ctx, {
    type: "line",
    plugins: [rangeFillPlugin],
    data: {
      labels,
      datasets: [
        {
          label: "最高价", data: maxData,
          borderColor: "#f06464", backgroundColor: "rgba(240,100,100,0.06)",
          borderWidth: 2, pointRadius: 5, pointHoverRadius: 7,
          pointBackgroundColor: "#f06464", tension: 0.35,
        },
        {
          label: "最低价", data: minData,
          borderColor: "#4fcf8a", backgroundColor: "rgba(79,207,138,0.06)",
          borderWidth: 2, pointRadius: 5, pointHoverRadius: 7,
          pointBackgroundColor: "#4fcf8a", tension: 0.35,
        },
        {
          label: "收盘价", data: closeData,
          borderColor: "#5b9cf6", backgroundColor: "transparent",
          borderWidth: 1.5, borderDash: [4, 3],
          pointRadius: 4, pointHoverRadius: 6,
          pointBackgroundColor: "#5b9cf6", tension: 0.35,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1e2230",
          borderColor: "#252a38", borderWidth: 1,
          titleColor: "#9198ae", bodyColor: "#e2e6f0",
          padding: 12,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}：¥${ctx.parsed.y.toFixed(2)}`
          }
        }
      },
      scales: {
        x: {
          grid: { color: "rgba(37,42,56,0.8)" },
          ticks: { color: "#6b738a", font: { family: "'JetBrains Mono'", size: 11 } },
        },
        y: {
          grid: { color: "rgba(37,42,56,0.8)" },
          ticks: {
            color: "#6b738a",
            font: { family: "'JetBrains Mono'", size: 11 },
            callback: v => `¥${v.toFixed(2)}`,
          },
        }
      }
    }
  });

  chartInstances[stock.code] = { instance, visible: { max: true, min: true, close: true } };

  // 折线开关
  const keyIndex = { max: 0, min: 1, close: 2 };
  const keyClass = { max: "active-max", min: "active-min", close: "active-close" };
  card.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const key = btn.dataset.key;
      const state = chartInstances[stock.code];
      state.visible[key] = !state.visible[key];
      state.instance.data.datasets[keyIndex[key]].hidden = !state.visible[key];
      state.instance.update();
      btn.classList.toggle(keyClass[key], state.visible[key]);
    });
  });


}

// ── 构建表格 HTML ─────────────────────────────────────────
function buildTableHTML(list, code) {
  // 找区间内最高/最低收盘价，用于高亮
  const closePrices = list.map(d => parseFloat(d.close));
  const maxClose = Math.max(...closePrices);
  const minClose = Math.min(...closePrices);

  // 表格行：最新在最上（倒序）
  const rows = [...list].reverse().map((d, i) => {
    const isLatest = i === 0;
    const pct = parseFloat(d.changepct ?? 0);
    const pctClass = pct > 0 ? "td-pct-up" : pct < 0 ? "td-pct-dn" : "td-pct-flat";
    const pctText  = pct > 0 ? `▲ ${pct.toFixed(2)}%` : pct < 0 ? `▼ ${Math.abs(pct).toFixed(2)}%` : `— ${pct.toFixed(2)}%`;

    const closeVal = parseFloat(d.close);
    let closeExtra = "";
    if (closeVal === maxClose && list.length > 1) closeExtra = ' title="区间最高收盘"';
    if (closeVal === minClose && list.length > 1) closeExtra = ' title="区间最低收盘"';

    // 成交量格式化（万手 / 亿手）
    const volRaw = parseFloat(d.volume ?? d.vol ?? 0);
    let volText = "—";
    if (volRaw > 0) {
      if (volRaw >= 1e8) volText = (volRaw / 1e8).toFixed(2) + " 亿";
      else volText = (volRaw / 1e4).toFixed(0) + " 万";
    }

    // 振幅
    const ampRaw = parseFloat(d.amplitude ?? d.zhenfu ?? 0);
    const ampText = ampRaw ? ampRaw.toFixed(2) + "%" : "—";

    return `
      <tr class="${isLatest ? "latest" : ""}">
        <td>${d.date.slice(5)}</td>
        <td class="td-max">¥${parseFloat(d.max).toFixed(2)}</td>
        <td class="td-min">¥${parseFloat(d.min).toFixed(2)}</td>
        <td class="td-close"${closeExtra}>¥${closeVal.toFixed(2)}</td>
        <td>${d.open ? "¥" + parseFloat(d.open).toFixed(2) : "—"}</td>
        <td class="${pctClass}">${pctText}</td>
        <td class="td-vol">${volText}</td>
      </tr>`;
  }).join("");

  return `
    <div class="table-section">
      <div class="table-section-label">数据明细</div>
      <div class="table-wrap">
        <table class="price-table">
          <thead>
            <tr>
              <th>日期</th>
              <th>最高价</th>
              <th>最低价</th>
              <th>收盘价</th>
              <th>开盘价</th>
              <th>涨跌幅</th>
              <th>成交量</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="table-pad"></div>
      </div>
    </div>`;
}
</script>
</body>
</html>
